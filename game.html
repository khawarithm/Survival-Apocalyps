<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, orientation=landscape">
    <title>Survivor Apocalyps - BATTLEFIELD V3.0</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="game-body">

    <div id="landscape-lock-screen" class="hidden">
        <div class="landscape-warning-box">
            <h2 class="text-danger-flash">ROTATE DEVICE!</h2>
        </div>
    </div>

    <div id="app-wrapper" class="app-wrapper game-container flex-column">
        
        <main id="battlefield" class="battle-zone" style="flex: 1; position: relative; overflow: hidden;">
            
            <div class="game-hud flex-between align-center p-10">
                <div class="hp-container">
                    <div class="hp-bar-bg">
                        <div id="hp-bar-fill" class="hp-fill"></div>
                    </div>
                    <div id="hp-text" class="text-micro text-khaki" style="margin-top: 3px; font-weight: bold;">BASE HP: 1000/1000</div>
                </div>
                
                <div class="wave-info text-center">
                    <h2 class="text-gold m-0" style="font-size: 1.5rem; text-shadow: 0 0 5px red;">WAVE <span id="current-wave-display">1</span></h2>
                    <div id="boss-warning" class="text-danger-flash hidden text-micro">⚠️ BOSS APPROACHING ⚠️</div>
                </div>
                
                <div class="hud-stats flex gap-10 align-center text-micro">
                    <div class="text-gold">Koin: <span id="match-coin">0</span></div>
                    <button id="btn-pause" class="btn-secondary" style="padding: 5px 15px;">PAUSE</button>
                </div>
            </div>

            <div id="airplane-skill-layer" class="hidden">
                <img src="assets/ap_skilled.png" id="anim-airplane" alt="Airplane Strike">
            </div>

            <div id="base-wall">
                <img src="assets/Base.png" alt="Base Wall" style="height: 100%; width: 100%; object-fit: cover;">
            </div>

            <div id="army-squad" class="army-formation">
                </div>

            <div id="zombie-spawn-lane" class="spawn-lane"></div>
            
        </main>

        <footer id="control-panel" class="control-zone flex-between align-center p-10">
            
            <div class="movement-controls flex gap-15">
                <button id="btn-move-left" class="btn-control">◀ KIRI</button>
                <button id="btn-move-right" class="btn-control">KANAN ▶</button>
            </div>

            <div class="action-controls flex gap-10">
                <button id="btn-item-medkit" class="btn-skill">
                    <img src="assets/medkit.png" alt="Medkit">
                    <span id="count-medkit" class="badge-count">0</span>
                </button>
                
                <button id="btn-skill-armored" class="btn-skill">
                    <img src="assets/armored.png" alt="Armored Army">
                    <span id="count-armored" class="badge-count">0/5</span>
                </button>

                <button id="btn-skill-airplane" class="btn-skill">
                    <img src="assets/airplane.png" alt="Airplane">
                    <span id="count-airplane" class="badge-count">0/1</span>
                </button>
            </div>
            
        </footer>
    </div>

    <div id="pause-menu" class="modal hidden">
        <div class="modal-content text-center">
            <h2 class="text-gold">GAME PAUSED</h2>
            <p class="text-khaki text-small">Strategi sedang ditinjau ulang...</p>
            <div class="flex-column gap-15 mt-20">
                <button id="btn-resume" class="btn-action btn-large">RESUME BATTLE</button>
                <button id="btn-abandon" class="btn-secondary btn-large" style="border-color: red; color: red;">ABANDON MISSION</button>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="modal hidden">
        <div class="modal-content text-center" style="border-color: red;">
            <h1 class="text-danger-flash m-0">MISSION FAILED</h1>
            <p class="text-khaki text-small">Pertahanan telah ditembus!</p>
            
            <div class="stats-box mt-15 text-left">
                <div class="flex-between"><span>Wave Terakhir:</span> <span id="go-wave" class="text-gold">0</span></div>
                <div class="flex-between"><span>Koin Dikumpulkan:</span> <span id="go-coin" class="text-gold">0</span></div>
                <div class="flex-between"><span>XP Diperoleh:</span> <span id="go-xp" class="text-gold">0</span></div>
            </div>

            <p class="text-micro mt-10" style="color: gray;">Menyimpan data pangkalan ke Cloud...</p>
            
            <button id="btn-go-lobby" class="btn-secondary mt-20" style="width: 100%;">KEMBALI KE MARKAS</button>
        </div>
    </div>

    <script src="js/firebase-init.js"></script>
    <script src="js/main.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
