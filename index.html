<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Peningkatan viewport untuk Fullscreen & Immersive Mode -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, orientation=landscape">
    <title>Survivor Apocalyps - Frontline Command V3.0</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="auth-body">

    <!-- OVERLAY: PENGUNCI LAYAR LANDSCAPE -->
    <div id="landscape-lock-screen" class="hidden">
        <div class="landscape-warning-box">
            <h2 class="text-danger-flash" style="margin-bottom: 15px;">ROTATE DEVICE!</h2>
            <p style="color: var(--color-khaki-light); font-size: 0.9rem;">Komandan, putar perangkat ke posisi Landscape demi pengalaman tempur maksimal!</p>
        </div>
    </div>

    <!-- WRAPPER V3.0: Sistem Skala Resolusi Anti-Potong -->
    <div id="app-wrapper" class="app-wrapper">
        
        <div class="auth-container">
            <div class="auth-header">
                <h1 class="text-gold m-0">SURVIVOR APOCALYPS</h1>
                <p class="text-khaki text-small mt-5">FRONTLINE COMMAND V3.0</p>
            </div>
            
            <div class="auth-form flex-column gap-15 mt-20">
                <input type="email" id="email" placeholder="MILITARY EMAIL (e.g. jhon@army.com)" class="mil-input">
                <input type="password" id="password" placeholder="ACCESS PIN (min. 6 chars)" class="mil-input">
                
                <div class="flex gap-10 mt-10">
                    <button id="btn-login" class="btn-action flex-1">DEPLOY (LOGIN)</button>
                    <button id="btn-register" class="btn-secondary flex-1">ENLIST (REGISTER)</button>
                </div>
            </div>
            
            <div id="auth-msg" class="auth-msg text-center mt-15 text-danger-flash"></div>
        </div>

    </div>

    <!-- ENGINE SCRIPTS -->
    <script src="js/firebase-init.js"></script>
   <script src="js/main.js"></script>
