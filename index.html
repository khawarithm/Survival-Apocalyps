<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Survivor Apocalyps - Login Gate</title>
    
    <!-- Integrasi PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Resource Desain -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <!-- Firebase SDK Compat Core (Stabil untuk Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="auth-body">

    <!-- OVERLAY: PENGUNCI LAYAR LANDSCAPE (MOBILE) -->
    <div id="landscape-lock-screen" class="hidden">
        <div class="landscape-warning-box">
            <h2 class="text-danger-flash" style="margin-bottom: 15px;">ROTATE DEVICE!</h2>
            <p style="color: var(--color-khaki-light); font-size: 0.9rem;">Komandan, putar perangkat ke posisi Landscape demi pengalaman tempur maksimal!</p>
        </div>
    </div>

    <!-- MODAL: CUSTOM TACTICAL ALERT -->
    <div id="custom-tactical-alert" class="modal hidden">
        <div class="modal-content custom-alert-box">
            <div class="modal-header">
                <span style="color: var(--color-gold);">[ SYSTEM NOTICE ]</span>
            </div>
            <div class="custom-alert-body">
                <p id="custom-alert-text" class="custom-alert-msg">MESSAGE</p>
                <button id="btn-custom-alert-ok" class="btn-secondary btn-large">ROGER THAT</button>
            </div>
        </div>
    </div>

    <!-- KOTAK AUTENTIKASI (LOGIN / REGISTER) -->
    <div class="auth-container">
        <h1 class="auth-title" id="auth-box-title">SECURE LOGIN GARRISON</h1>
        
        <form id="auth-form" onsubmit="return false;">
            <div class="form-group">
                <label>EMAIL MILITER :</label>
                <input type="email" id="auth-email" required placeholder="soldier@garrison.com">
            </div>
            <div class="form-group">
                <label>KATA SANDI :</label>
                <input type="password" id="auth-password" required placeholder="******">
            </div>
            
            <div class="auth-actions">
                <button type="submit" id="btn-primary-auth" class="btn-action">SIGN IN</button>
            </div>
        </form>
        
        <div id="auth-toggle-msg" class="toggle-auth-mode">Belum punya akun? Daftarkan Pasukan Baru</div>
        
        <!-- KREDIT SINGKAT DI UI -->
        <div style="text-align: center; margin-top: 15px; font-size: 0.6rem; color: #555;">
            v2.0 &copy; 2026 Survivor Apocalyps Command
        </div>
    </div>

    <!-- LOGIKA SISTEM -->
    <script src="js/firebase-init.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
